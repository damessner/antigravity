services:
  db:
    image: postgres:15-alpine
    container_name: school_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SuperSecretSchoolDbPass2026!}
      POSTGRES_DB: ${POSTGRES_DB:-school_management}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-school_management}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_backend
    restart: unless-stopped
    environment:
      PORT: ${PORT:-4000}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-SuperSecretSchoolDbPass2026!}
      DB_NAME: ${DB_NAME:-school_management}
      JWT_SECRET: ${JWT_SECRET:-SuperSecureAustrianSchoolJwtSecretKey998877!}
    ports:
      - "4000:4000"
    volumes:
      - backups:/opt/school-management/backups
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: school_frontend
    restart: unless-stopped
    environment:
      # IMPORTANT: For iPad/mobile access, replace localhost with your server's LAN IP
      # e.g. NEXT_PUBLIC_API_URL=http://192.168.1.100:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
    name: school_management_pgdata
  backups:
    name: school_management_backups
