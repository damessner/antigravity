services:
  db:
    image: postgres:15-alpine
    container_name: school_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SuperSecretSchoolDbPass2026!}
      POSTGRES_DB: ${POSTGRES_DB:-school_management}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./school_data/db:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-school_management}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_backend
    restart: unless-stopped
    environment:
      PORT: ${PORT:-4000}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-SuperSecretSchoolDbPass2026!}
      DB_NAME: ${DB_NAME:-school_management}
      JWT_SECRET: ${JWT_SECRET:-SuperSecureAustrianSchoolJwtSecretKey998877!}
    ports:
      - "4000:4000"
    volumes:
      - ./school_data/backups:/opt/school-management/backups
      - ./school_data/logs:/opt/school-management/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/setup/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: school_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3000"
    environment:
      BACKEND_URL: http://backend:4000
    depends_on:
      backend:
        condition: service_started

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes: {}
