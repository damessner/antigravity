# ==============================================================================
# 🏫 Schulmanagement V2.3 — Enterprise Production Compose
# ==============================================================================
# Usage:
#   Standard:               docker compose -f docker-compose.prod.yml up -d
#   With Cloudflare Tunnel: docker compose -f docker-compose.prod.yml --profile cloudflare up -d
#   With Tailscale:         docker compose -f docker-compose.prod.yml --profile tailscale up -d
#   With Rclone Backup:     docker compose -f docker-compose.prod.yml --profile rclone up -d
#   All sidecars:           docker compose -f docker-compose.prod.yml --profile cloudflare --profile rclone up -d
#
# The setup_access.sh wizard writes the required variables into .env automatically.
# ==============================================================================

services:

  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: school_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SuperSecretSchoolDbPass2026!}
      POSTGRES_DB: ${POSTGRES_DB:-school_management}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./school_data/db:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-school_management}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - school_net

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_backend
    restart: unless-stopped
    environment:
      PORT: ${PORT:-4000}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-SuperSecretSchoolDbPass2026!}
      DB_NAME: ${DB_NAME:-school_management}
      JWT_SECRET: ${JWT_SECRET:-SuperSecureAustrianSchoolJwtSecretKey998877!}
    ports:
      - "4000:4000"
    volumes:
      - ./school_data/backups:/opt/school-management/backups
      - ./school_data/logs:/opt/school-management/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/setup/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - school_net

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: school_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - school_net

  # ── 🌐 Cloudflare Tunnel Sidecar (profile: cloudflare) ─────────────────────
  # Activate with: --profile cloudflare
  # Requires CLOUDFLARE_TUNNEL_TOKEN in .env (set by setup_access.sh)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: school_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      frontend:
        condition: service_healthy
    profiles:
      - cloudflare
    networks:
      - school_net

  # ── 🔒 Tailscale Sidecar (profile: tailscale) ───────────────────────────────
  # Activate with: --profile tailscale
  # Requires TAILSCALE_AUTH_KEY in .env (set by setup_access.sh)
  tailscale:
    image: tailscale/tailscale:latest
    container_name: school_tailscale
    restart: unless-stopped
    hostname: ${TAILSCALE_HOSTNAME:-schulmanagement}
    environment:
      TS_AUTHKEY: ${TAILSCALE_AUTH_KEY}
      TS_EXTRA_ARGS: ${TAILSCALE_EXTRA_ARGS:---advertise-tags=tag:server}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - ./school_data/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    profiles:
      - tailscale
    networks:
      - school_net

  # ── ☁️ Rclone Cloud-Sync Backup Sidecar (profile: rclone) ──────────────────
  # Activate with: --profile rclone
  # Requires a valid rclone.conf mounted at ./school_data/rclone/rclone.conf
  # Generated by setup_access.sh or placed manually.
  # Syncs encrypted backups from school_data/backups/ to your configured remote.
  rclone:
    image: rclone/rclone:latest
    container_name: school_rclone
    restart: unless-stopped
    environment:
      RCLONE_CONFIG: /config/rclone.conf
    volumes:
      - ./school_data/backups:/data/backups:ro
      - ./school_data/rclone:/config
    # Watch loop: every RCLONE_SYNC_INTERVAL seconds (default: 300 = 5 min), sync to remote.
    # RCLONE_REMOTE_PATH must be set in .env, e.g. "gdrive:schulmanagement/backups"
    command: >
      sh -c "
        echo '☁️  Rclone backup sidecar starting...' &&
        while true; do
          echo \"[$(date '+%Y-%m-%d %H:%M:%S')] 🔄 Syncing backups to ${RCLONE_REMOTE_PATH:-gdrive:schulmanagement/backups}...\" &&
          rclone sync /data/backups \"${RCLONE_REMOTE_PATH:-gdrive:schulmanagement/backups}\"
            --crypt-password \"${RCLONE_CRYPT_PASSWORD:-}\"
            --log-level INFO
            --log-file /config/rclone-sync.log &&
          echo \"[$(date '+%Y-%m-%d %H:%M:%S')] ✅ Sync complete.\" ||
          echo \"[$(date '+%Y-%m-%d %H:%M:%S')] ⚠️  Sync failed. Check /config/rclone-sync.log\" &&
          sleep ${RCLONE_SYNC_INTERVAL:-300};
        done
      "
    profiles:
      - rclone
    networks:
      - school_net

# ── Networks ────────────────────────────────────────────────────────────────
networks:
  school_net:
    driver: bridge

volumes: {}
